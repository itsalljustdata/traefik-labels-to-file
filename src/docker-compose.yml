
services:
  traefik-generator:
    image: "ghcr.io/itsalljustdata/traefik-labels-to-file:dev"
    pull_policy: never
    build:
      context: .
      no_cache: true
    container_name: traefik-generator
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../dynamic:/dynamic
    # Environment overrides if needed (e.g., for cross-host scenarios)
    environment:
      # required: explicit host token used in generated names/files
      #   getent group docker | cut -d: -f3
      - DOCKER_SERVER_NAME=${DOCKER_SERVER_NAME:?set DOCKER_SERVER_NAME in .env or shell}
      # runtime user/group mapping used by entrypoint (start as root, then drop privileges)
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - DOCKER_GID=${DOCKER_GID:-999}
      - USER_SHELL=${USER_SHELL:-bash}
      # one-shot defaults are replaced by long-running daemon mode below
      - LOOP_SECONDS=300
      - WATCH_DOCKER_EVENTS=false
      - EVENT_DEBOUNCE_SECONDS=1.5
      # - DOCKER_ENDPOINT=https://remote-docker-host:2376
    #   - UPSTREAM_HOST=remote-docker-host
      # Optional webhook trigger (requires network access and open port)
      # - WEBHOOK_BIND=0.0.0.0:8080
      # - WEBHOOK_PATH=/generate
      # - WEBHOOK_TOKEN=change-me
    # Required for non-root docker.sock access: host docker.sock group id.
    restart: on-failure:3
    # Uncomment if using WEBHOOK_BIND
    # ports:
    #   - "8080:8080"

    # no need for network access, if running on the same host as Docker
    # and avoids potential conflicts with host's Docker socket.
    # Disable this if you want webhook-trigger mode.
    network_mode: none
